<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Soft gradient base -->
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#e3e3e3"/>
    </linearGradient>

    <!-- Light overlay gradient -->
    <linearGradient id="lightGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dcdcdc" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#baseGrad)"/>

  <!-- Geometric shapes -->
  <polygon points="0,0 500,0 250,350" fill="url(#lightGrad)" opacity="0.7"/>
  <polygon points="500,0 800,200 600,500" fill="#ffffff" opacity="0.6"/>
  <polygon points="0,400 300,300 200,700" fill="#ededed" opacity="0.7"/>
  <polygon points="300,300 700,400 500,800" fill="#f5f5f5" opacity="0.6"/>
  <polygon points="0,800 400,700 200,1200" fill="#e6e6e6" opacity="0.7"/>
  <polygon points="400,700 800,900 600,1200" fill="#f0f0f0" opacity="0.6"/>

  <!-- Subtle lines -->
  <g stroke="#dddddd" stroke-width="1" opacity="0.5">
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
  </g>
</svg>